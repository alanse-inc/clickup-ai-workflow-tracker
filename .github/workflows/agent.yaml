name: AI Agent

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'ClickUp Task ID'
        required: true
        type: string
      phase:
        description: 'SPEC or CODE'
        required: true
        type: choice
        options:
          - SPEC
          - CODE
      status_on_success:
        description: 'ClickUp status to set on success'
        required: true
        type: string
      status_on_error:
        description: 'ClickUp status to revert on error'
        required: true
        type: string

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      # GITHUB_TOKEN で push/PR 作成すると CI がトリガーされない GitHub の仕様を回避するため、
      # GitHub App トークン → GITHUB_PAT → GITHUB_TOKEN の優先順位でトークンを選択する。
      #
      # Org レベルの Secret に設定すると全リポジトリで CI 自動トリガーが有効になる。
      # Secret 名は自組織に合わせて変更すること（例: CI_APP_ID / CI_APP_PRIVATE_KEY）。
      - name: Validate phase input
        env:
          PHASE: ${{ inputs.phase }}
        run: |
          if [[ "$PHASE" != "SPEC" && "$PHASE" != "CODE" ]]; then
            echo "Invalid phase: '$PHASE'. Must be 'SPEC' or 'CODE'."
            exit 1
          fi

      - name: Generate GitHub App token
        id: app_token
        continue-on-error: true
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6

      - name: Fetch ClickUp task
        id: fetch_task
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          TASK_ID: ${{ inputs.task_id }}
        run: |
          RESPONSE=$(curl -fsS --retry 3 --retry-delay 2 --retry-all-errors \
            "https://api.clickup.com/api/v2/task/${TASK_ID}" \
            -H "Authorization: ${CLICKUP_API_TOKEN}")
          echo "task_name=$(echo "$RESPONSE" | jq -r '.name')" >> "$GITHUB_OUTPUT"
          DELIMITER="CLICKUP_DESC_$(openssl rand -hex 8)"
          echo "task_description<<${DELIMITER}" >> "$GITHUB_OUTPUT"
          echo "$RESPONSE" | jq -r '.description // ""' >> "$GITHUB_OUTPUT"
          echo "${DELIMITER}" >> "$GITHUB_OUTPUT"
          DELIMITER_TC="CLICKUP_TC_$(openssl rand -hex 8)"
          echo "task_text_content<<${DELIMITER_TC}" >> "$GITHUB_OUTPUT"
          echo "$RESPONSE" | jq -r '.text_content // ""' >> "$GITHUB_OUTPUT"
          echo "${DELIMITER_TC}" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code (SPEC)
        id: claude_spec
        if: inputs.phase == 'SPEC'
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: '*'
          show_full_output: true
          prompt: |
            以下の ClickUp タスクの内容をもとに、実装仕様書を Markdown で作成してください。
            リポジトリの既存コードを読み込み、現在のアーキテクチャ・コーディングスタイルを踏まえて仕様を作成してください。

            タスク名: ${{ steps.fetch_task.outputs.task_name }}
            タスク内容:
            ${{ steps.fetch_task.outputs.task_description }}

            仕様書には以下を含めてください:
            - 変更の概要
            - 影響を受けるファイル
            - 実装方針
            - テスト方針
            - 考慮事項・リスク
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_PAT || secrets.GITHUB_TOKEN }}

      - name: Run Claude Code (CODE)
        id: claude_code
        if: inputs.phase == 'CODE'
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: '*'
          show_full_output: true
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(*)",
                  "Read(*)",
                  "Write(*)",
                  "Edit(*)",
                  "Glob(*)",
                  "Grep(*)"
                ]
              }
            }
          prompt: |
            以下のタスク情報に基づいてコードを実装し、PR を作成してください。
            タスクの説明が詳細な仕様書の場合はそれに従い、
            簡易な説明やアイデアレベルの場合はリポジトリの既存コードを読み込み、
            アーキテクチャ・コーディングスタイルを踏まえて適切に実装してください。

            タスク名: ${{ steps.fetch_task.outputs.task_name }}
            タスク内容:
            ${{ steps.fetch_task.outputs.task_description }}

            実装手順:
            1. feature/clickup-${{ inputs.task_id }} ブランチを作成
            2. タスク内容（仕様があればそれも含む）に基づいてコードを変更
            3. テストを実行して通ることを確認
            4. コミット＆Push
            5. gh pr create で PR を作成。description の末尾に必ず以下の行を含めること:
               Closes CU-${{ inputs.task_id }}

            コーディング規約は CLAUDE.md を参照してください。
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app_token.outputs.token || secrets.GITHUB_PAT || secrets.GITHUB_TOKEN }}

      - name: Update ClickUp status on success
        if: success()
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          TASK_ID: ${{ inputs.task_id }}
          STATUS: ${{ inputs.status_on_success }}
        run: |
          curl -fsS --retry 3 --retry-delay 2 --retry-all-errors \
            -X PUT "https://api.clickup.com/api/v2/task/${TASK_ID}" \
            -H "Authorization: ${CLICKUP_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg status "$STATUS" '{status: $status}')"

      - name: Post PR link to ClickUp (CODE)
        if: success() && inputs.phase == 'CODE'
        continue-on-error: true
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          TASK_ID: ${{ inputs.task_id }}
          GH_TOKEN: ${{ steps.app_token.outputs.token || secrets.GITHUB_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr list --head "feature/clickup-${TASK_ID}" --json url --jq '.[0].url')
          if [ -n "$PR_URL" ]; then
            curl -fsS --retry 3 --retry-delay 2 --retry-all-errors \
              -X POST "https://api.clickup.com/api/v2/task/${TASK_ID}/comment" \
              -H "Authorization: ${CLICKUP_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg text "PR created: ${PR_URL}" '{comment_text: $text}')"
          fi

      - name: Update ClickUp description (SPEC)
        if: success() && inputs.phase == 'SPEC'
        continue-on-error: true
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          TASK_ID: ${{ inputs.task_id }}
          ORIGINAL: ${{ steps.fetch_task.outputs.task_text_content }}
          SPEC: ${{ steps.claude_spec.outputs.result }}
        run: |
          if [ -z "$SPEC" ]; then
            echo "::warning::claude_spec output is empty. Skipping description update."
            exit 0
          fi
          CLEAN_ORIGINAL=$(printf '%s' "$ORIGINAL" | python3 -c "
          import sys
          text = sys.stdin.read()
          marker = '\n\n---\n\n## AI Generated Spec'
          idx = text.find(marker)
          if idx != -1:
              text = text[:idx]
          print(text.rstrip())
          ")
          COMBINED=$(printf '%s\n\n---\n\n## AI Generated Spec\n\n%s' "$CLEAN_ORIGINAL" "$SPEC")
          jq -n --arg md "$COMBINED" '{markdown_description: $md}' | \
          curl -fsS --retry 3 --retry-delay 2 --retry-all-errors \
            -X PUT "https://api.clickup.com/api/v2/task/${TASK_ID}" \
            -H "Authorization: ${CLICKUP_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @-

      - name: Record error to ClickUp
        if: failure()
        continue-on-error: true
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          TASK_ID: ${{ inputs.task_id }}
          FIELD_ID: ${{ secrets.CLICKUP_AGENT_ERROR_FIELD_ID }}
          PHASE: ${{ inputs.phase }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          ERROR_MSG="Workflow failed [phase=${PHASE}, task=${TASK_ID}]: ${RUN_URL}"
          curl -fsS --retry 3 --retry-delay 2 --retry-all-errors \
            -X POST "https://api.clickup.com/api/v2/task/${TASK_ID}/field/${FIELD_ID}" \
            -H "Authorization: ${CLICKUP_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg val "$ERROR_MSG" '{value: $val}')"

      - name: Update ClickUp status on error
        if: failure()
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          TASK_ID: ${{ inputs.task_id }}
          STATUS: ${{ inputs.status_on_error }}
        run: |
          curl -fsS --retry 3 --retry-delay 2 --retry-all-errors \
            -X PUT "https://api.clickup.com/api/v2/task/${TASK_ID}" \
            -H "Authorization: ${CLICKUP_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg status "$STATUS" '{status: $status}')"
