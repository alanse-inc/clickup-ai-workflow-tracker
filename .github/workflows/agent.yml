name: AI Agent

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'ClickUp Task ID'
        required: true
        type: string
      phase:
        description: 'SPEC or CODE'
        required: true
        type: string
      status_on_success:
        description: 'ClickUp status to set on success'
        required: true
        type: string
      status_on_error:
        description: 'ClickUp status to revert on error'
        required: true
        type: string

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Fetch ClickUp task
        id: fetch_task
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          TASK_ID: ${{ inputs.task_id }}
        run: |
          RESPONSE=$(curl -fsS --retry 3 --retry-delay 2 --retry-all-errors \
            "https://api.clickup.com/api/v2/task/${TASK_ID}" \
            -H "Authorization: ${CLICKUP_API_TOKEN}")
          echo "task_name=$(echo "$RESPONSE" | jq -r '.name')" >> "$GITHUB_OUTPUT"
          DELIMITER="CLICKUP_DESC_$(openssl rand -hex 8)"
          echo "task_description<<${DELIMITER}" >> "$GITHUB_OUTPUT"
          echo "$RESPONSE" | jq -r '.description // ""' >> "$GITHUB_OUTPUT"
          echo "${DELIMITER}" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code (SPEC)
        id: claude_spec
        if: inputs.phase == 'SPEC'
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            以下の ClickUp タスクの内容をもとに、実装仕様書を Markdown で作成してください。
            リポジトリの既存コードを読み込み、現在のアーキテクチャ・コーディングスタイルを踏まえて仕様を作成してください。

            タスク名: ${{ steps.fetch_task.outputs.task_name }}
            タスク内容:
            ${{ steps.fetch_task.outputs.task_description }}

            仕様書には以下を含めてください:
            - 変更の概要
            - 影響を受けるファイル
            - 実装方針
            - テスト方針
            - 考慮事項・リスク
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude Code (CODE)
        id: claude_code
        if: inputs.phase == 'CODE'
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            以下の仕様に基づいてコードを実装し、PR を作成してください。

            タスク名: ${{ steps.fetch_task.outputs.task_name }}
            仕様:
            ${{ steps.fetch_task.outputs.task_description }}

            実装手順:
            1. feature/clickup-${{ inputs.task_id }} ブランチを作成
            2. 仕様に基づいてコードを変更
            3. テストを実行して通ることを確認
            4. コミット＆Push
            5. gh pr create で PR を作成。description の末尾に必ず以下の行を含めること:
               Closes CU-${{ inputs.task_id }}

            コーディング規約は CLAUDE.md を参照してください。
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update ClickUp status on success
        if: success()
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          TASK_ID: ${{ inputs.task_id }}
          STATUS: ${{ inputs.status_on_success }}
        run: |
          curl -fsS --retry 3 --retry-delay 2 --retry-all-errors \
            -X PUT "https://api.clickup.com/api/v2/task/${TASK_ID}" \
            -H "Authorization: ${CLICKUP_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg status "$STATUS" '{status: $status}')"

      - name: Update ClickUp description (SPEC)
        if: success() && inputs.phase == 'SPEC'
        continue-on-error: true
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          TASK_ID: ${{ inputs.task_id }}
          SPEC_RESULT: ${{ steps.claude_spec.outputs.result }}
        run: |
          curl -fsS --retry 3 --retry-delay 2 --retry-all-errors \
            -X PUT "https://api.clickup.com/api/v2/task/${TASK_ID}" \
            -H "Authorization: ${CLICKUP_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg desc "$SPEC_RESULT" '{description: $desc}')"

      - name: Record error to ClickUp
        if: failure()
        continue-on-error: true
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          TASK_ID: ${{ inputs.task_id }}
          FIELD_ID: ${{ secrets.CLICKUP_AGENT_ERROR_FIELD_ID }}
          PHASE: ${{ inputs.phase }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          ERROR_MSG="Workflow failed [phase=${PHASE}, task=${TASK_ID}]: ${RUN_URL}"
          curl -fsS --retry 3 --retry-delay 2 --retry-all-errors \
            -X POST "https://api.clickup.com/api/v2/task/${TASK_ID}/field/${FIELD_ID}" \
            -H "Authorization: ${CLICKUP_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg val "$ERROR_MSG" '{value: $val}')"

      - name: Update ClickUp status on error
        if: failure()
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          TASK_ID: ${{ inputs.task_id }}
          STATUS: ${{ inputs.status_on_error }}
        run: |
          curl -fsS --retry 3 --retry-delay 2 --retry-all-errors \
            -X PUT "https://api.clickup.com/api/v2/task/${TASK_ID}" \
            -H "Authorization: ${CLICKUP_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg status "$STATUS" '{status: $status}')"
